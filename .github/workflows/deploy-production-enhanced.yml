name: Full Pipeline — Build → Dev → Staging → Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  EKS_CLUSTER: volteryde-production
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.sa-east-1.amazonaws.com

jobs:
  # ============================================================================
  # STAGE 1: BUILD & PUSH DOCKER IMAGES
  # ============================================================================

  build-and-push:
    name: "1 · Build & Push Docker Images"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push NestJS Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/volteryde-nest/Dockerfile.prod
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/volteryde/nestjs-service:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/volteryde/nestjs-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Build & Push Spring Boot Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/volteryde-springboot/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-auth:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=api-gateway

      - name: Build & Push Spring Boot Client Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/volteryde-springboot/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-client-auth:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-client-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=client-auth-service

      - name: Build & Push Spring Boot Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/volteryde-springboot/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-payment:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/volteryde/springboot-payment:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=payment-service

      - name: Build & Push Temporal Workers
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/temporal-workers/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/volteryde/temporal-workers:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/volteryde/temporal-workers:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack — Build Complete
        if: success()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Docker images built and pushed",
              "attachments": [
                {
                  "color": "#36a64f",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "📦 Pipeline Stage 1 — Images Built" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Tag:*\n`${{ github.sha }}`" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "✅ `nestjs-service`  ✅ `springboot-service`  ✅ `temporal-workers`  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                      ]
                    }
                  ]
                }
              ]
            }
        continue-on-error: true

  # ============================================================================
  # STAGE 2: DEPLOY TO DEV
  # ============================================================================

  deploy-to-dev:
    name: "2 · Deploy to DEV Sandbox"
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://dev-api.volteryde.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Cleanup stale DEV deployments (one-time selector migration)
        run: |
          echo "🧹 Cleaning up stale resources in volteryde-dev..."
          
          # Delete deployments with stale label selectors (environment/cost-center baked into spec.selector)
          for deploy in volteryde-api volteryde-auth volteryde-payment postgres redis routing-service temporal-workers; do
            if kubectl get deployment "$deploy" -n volteryde-dev &>/dev/null; then
              SELECTOR=$(kubectl get deployment "$deploy" -n volteryde-dev -o=jsonpath='{.spec.selector.matchLabels.environment}' 2>/dev/null)
              if [ -n "$SELECTOR" ]; then
                echo "  Deleting deployment $deploy (has stale environment=$SELECTOR in selector)..."
                kubectl delete deployment "$deploy" -n volteryde-dev --ignore-not-found || true
              fi
            fi
          done

          # Delete PVCs with wrong StorageClass (gp3 → gp2 migration, PVC spec is immutable)
          for pvc in postgres-pvc redis-pvc routing-data-pvc; do
            if kubectl get pvc "$pvc" -n volteryde-dev &>/dev/null; then
              SC=$(kubectl get pvc "$pvc" -n volteryde-dev -o=jsonpath='{.spec.storageClassName}' 2>/dev/null)
              if [ "$SC" != "gp2" ]; then
                echo "  Deleting PVC $pvc (has storageClass=$SC, expected gp2)..."
                kubectl delete pvc "$pvc" -n volteryde-dev --ignore-not-found || true
              fi
            fi
          done

          echo "✅ Cleanup complete"
        continue-on-error: true

      - name: Deploy to DEV via Kustomize
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          cd infrastructure/kubernetes/overlays/dev

          kustomize edit set image \
            volteryde/nestjs-service=${{ env.ECR_REGISTRY }}/volteryde/nestjs-service:${IMAGE_TAG} \
            volteryde/springboot-service=${{ env.ECR_REGISTRY }}/volteryde/springboot-auth:${IMAGE_TAG} \
            volteryde/springboot-client-auth=${{ env.ECR_REGISTRY }}/volteryde/springboot-client-auth:${IMAGE_TAG} \
            volteryde/springboot-payment=${{ env.ECR_REGISTRY }}/volteryde/springboot-payment:${IMAGE_TAG} \
            volteryde/temporal-workers=${{ env.ECR_REGISTRY }}/volteryde/temporal-workers:${IMAGE_TAG}

          echo "📋 Applying kustomize manifests to volteryde-dev..."
          kustomize build . | kubectl apply --server-side --force-conflicts -f -

      - name: Wait for DEV rollout
        run: |
          kubectl rollout status deployment/volteryde-api -n volteryde-dev --timeout=5m || true
          kubectl rollout status deployment/volteryde-auth -n volteryde-dev --timeout=5m || true
          kubectl rollout status deployment/volteryde-client-auth -n volteryde-dev --timeout=5m || true
          kubectl rollout status deployment/volteryde-payment -n volteryde-dev --timeout=5m || true
          kubectl rollout status deployment/temporal-workers -n volteryde-dev --timeout=5m || true

      - name: DEV Smoke Test
        run: |
          echo "🧪 Running DEV smoke tests..."
          kubectl get pods -n volteryde-dev
          kubectl wait --for=condition=ready pod -l app=volteryde-api -n volteryde-dev --timeout=3m || true
          echo "✅ DEV smoke tests passed"
        continue-on-error: true

      - name: Notify Slack — DEV Deployed
        if: success()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Deployment to DEV Sandbox succeeded",
              "attachments": [
                {
                  "color": "#36a64f",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🚀 Pipeline Stage 2 — DEV Sandbox Deployed" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nDevelopment (`volteryde-dev`)" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                        { "type": "mrkdwn", "text": "*Next:*\nStaging →" }
                      ]
                    },
                    { "type": "divider" },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "✅ DEV healthy  |  Progressing to Staging...  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                      ]
                    }
                  ]
                }
              ]
            }
        continue-on-error: true

      - name: Rollback DEV on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/volteryde-api -n volteryde-dev || true
          kubectl rollout undo deployment/volteryde-auth -n volteryde-dev || true
          kubectl rollout undo deployment/volteryde-client-auth -n volteryde-dev || true
          kubectl rollout undo deployment/volteryde-payment -n volteryde-dev || true
          kubectl rollout undo deployment/temporal-workers -n volteryde-dev || true

      - name: Notify Slack — DEV Failed
        if: failure()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "DEV deployment failed — pipeline stopped",
              "attachments": [
                {
                  "color": "#cc0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🔴 Pipeline Stopped — DEV Deployment Failed" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nDevelopment (`volteryde-dev`)" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "❌ Pipeline halted  |  🔄 Rollback executed  |  Staging & Production skipped  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>" }
                      ]
                    }
                  ]
                }
              ]
            }
        continue-on-error: true

  # ============================================================================
  # STAGE 3: DEPLOY TO STAGING
  # ============================================================================

  deploy-to-staging:
    name: "3 · Deploy to Staging"
    needs: [build-and-push, deploy-to-dev]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-api.volteryde.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Cleanup stale Staging deployments (one-time selector migration)
        run: |
          echo "🧹 Cleaning up stale resources in volteryde-staging..."
          
          # Delete deployments with stale label selectors
          for deploy in volteryde-api volteryde-auth volteryde-payment postgres redis routing-service temporal-workers; do
            if kubectl get deployment "$deploy" -n volteryde-staging &>/dev/null; then
              SELECTOR=$(kubectl get deployment "$deploy" -n volteryde-staging -o=jsonpath='{.spec.selector.matchLabels.environment}' 2>/dev/null)
              if [ -n "$SELECTOR" ]; then
                echo "  Deleting deployment $deploy (has stale environment=$SELECTOR in selector)..."
                kubectl delete deployment "$deploy" -n volteryde-staging --ignore-not-found || true
              fi
            fi
          done

          # Delete PVCs with wrong StorageClass (gp3 → gp2 migration, PVC spec is immutable)
          for pvc in postgres-pvc redis-pvc routing-data-pvc; do
            if kubectl get pvc "$pvc" -n volteryde-staging &>/dev/null; then
              SC=$(kubectl get pvc "$pvc" -n volteryde-staging -o=jsonpath='{.spec.storageClassName}' 2>/dev/null)
              if [ "$SC" != "gp2" ]; then
                echo "  Deleting PVC $pvc (has storageClass=$SC, expected gp2)..."
                kubectl delete pvc "$pvc" -n volteryde-staging --ignore-not-found || true
              fi
            fi
          done

          echo "✅ Cleanup complete"
        continue-on-error: true

      - name: Deploy to Staging via Kustomize
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          cd infrastructure/kubernetes/overlays/staging

          kustomize edit set image \
            volteryde/nestjs-service=${{ env.ECR_REGISTRY }}/volteryde/nestjs-service:${IMAGE_TAG} \
            volteryde/springboot-service=${{ env.ECR_REGISTRY }}/volteryde/springboot-auth:${IMAGE_TAG} \
            volteryde/springboot-client-auth=${{ env.ECR_REGISTRY }}/volteryde/springboot-client-auth:${IMAGE_TAG} \
            volteryde/springboot-payment=${{ env.ECR_REGISTRY }}/volteryde/springboot-payment:${IMAGE_TAG} \
            volteryde/temporal-workers=${{ env.ECR_REGISTRY }}/volteryde/temporal-workers:${IMAGE_TAG}

          echo "📋 Applying kustomize manifests to volteryde-staging..."
          kustomize build . | kubectl apply --server-side --force-conflicts -f -

      - name: Wait for Staging rollout
        run: |
          kubectl rollout status deployment/volteryde-api -n volteryde-staging --timeout=10m || true
          kubectl rollout status deployment/volteryde-auth -n volteryde-staging --timeout=10m || true
          kubectl rollout status deployment/volteryde-client-auth -n volteryde-staging --timeout=10m || true
          kubectl rollout status deployment/volteryde-payment -n volteryde-staging --timeout=10m || true
          kubectl rollout status deployment/temporal-workers -n volteryde-staging --timeout=10m || true

      - name: Staging Smoke Test
        run: |
          echo "🧪 Running Staging smoke tests..."
          kubectl get pods -n volteryde-staging
          kubectl wait --for=condition=ready pod -l app=volteryde-api -n volteryde-staging --timeout=3m || true
          kubectl wait --for=condition=ready pod -l app=volteryde-auth -n volteryde-staging --timeout=3m || true
          echo "✅ Staging smoke tests passed"
        continue-on-error: true

      - name: Notify Slack — Staging Deployed
        if: success()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Deployment to Staging succeeded",
              "attachments": [
                {
                  "color": "#36a64f",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🚀 Pipeline Stage 3 — Staging Deployed" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nStaging (`volteryde-staging`)" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                        { "type": "mrkdwn", "text": "*Next:*\nProduction →" }
                      ]
                    },
                    { "type": "divider" },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "✅ Staging healthy  |  Progressing to Production...  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                      ]
                    }
                  ]
                }
              ]
            }
        continue-on-error: true

      - name: Rollback Staging on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/volteryde-api -n volteryde-staging || true
          kubectl rollout undo deployment/volteryde-auth -n volteryde-staging || true
          kubectl rollout undo deployment/volteryde-client-auth -n volteryde-staging || true
          kubectl rollout undo deployment/volteryde-payment -n volteryde-staging || true
          kubectl rollout undo deployment/temporal-workers -n volteryde-staging || true

      - name: Notify Slack — Staging Failed
        if: failure()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Staging deployment failed — pipeline stopped",
              "attachments": [
                {
                  "color": "#cc0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🔴 Pipeline Stopped — Staging Deployment Failed" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nStaging (`volteryde-staging`)" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "❌ Pipeline halted  |  🔄 Rollback executed  |  Production skipped  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>" }
                      ]
                    }
                  ]
                }
              ]
            }
        continue-on-error: true

  # ============================================================================
  # STAGE 4: DEPLOY TO PRODUCTION (Blue-Green)
  # ============================================================================

  deploy-to-production:
    name: "4 · Blue-Green Deploy to Production"
    needs: [build-and-push, deploy-to-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.volteryde.com

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Deploy to Production via Kustomize
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          cd infrastructure/kubernetes/overlays/production

          kustomize edit set image \
            volteryde/nestjs-service=${{ env.ECR_REGISTRY }}/volteryde/nestjs-service:${IMAGE_TAG} \
            volteryde/springboot-service=${{ env.ECR_REGISTRY }}/volteryde/springboot-auth:${IMAGE_TAG} \
            volteryde/springboot-client-auth=${{ env.ECR_REGISTRY }}/volteryde/springboot-client-auth:${IMAGE_TAG} \
            volteryde/springboot-payment=${{ env.ECR_REGISTRY }}/volteryde/springboot-payment:${IMAGE_TAG} \
            volteryde/temporal-workers=${{ env.ECR_REGISTRY }}/volteryde/temporal-workers:${IMAGE_TAG}

          echo "📋 Applying kustomize manifests to production..."
          kustomize build . | kubectl apply --server-side --force-conflicts -f -

      - name: Wait for Production rollout
        run: |
          echo "⏳ Waiting for all deployments to roll out..."
          kubectl rollout status deployment/volteryde-api -n production --timeout=15m
          kubectl rollout status deployment/volteryde-auth -n production --timeout=15m
          kubectl rollout status deployment/volteryde-client-auth -n production --timeout=15m
          kubectl rollout status deployment/volteryde-payment -n production --timeout=15m
          kubectl rollout status deployment/temporal-workers -n production --timeout=15m
          echo "✅ All services deployed successfully"

      - name: Health Check - NestJS (volteryde-api)
        run: |
          echo "🏥 Running health checks on volteryde-api..."
          kubectl wait --for=condition=ready pod -l app=volteryde-api -n production --timeout=5m
          kubectl get pods -n production -l app=volteryde-api
          kubectl logs -n production -l app=volteryde-api --tail=50 | grep -i error || echo "No errors found"
          echo "✅ NestJS health check passed"

      - name: Health Check - Spring Boot Auth (volteryde-auth)
        run: |
          echo "🏥 Running health checks on volteryde-auth..."
          kubectl wait --for=condition=ready pod -l app=volteryde-auth -n production --timeout=5m
          kubectl get pods -n production -l app=volteryde-auth
          echo "✅ Spring Boot Auth health check passed"

      - name: Health Check - Spring Boot Client Auth (volteryde-client-auth)
        run: |
          echo "🏥 Running health checks on volteryde-client-auth..."
          kubectl wait --for=condition=ready pod -l app=volteryde-client-auth -n production --timeout=5m
          kubectl get pods -n production -l app=volteryde-client-auth
          echo "✅ Spring Boot Client Auth health check passed"

      - name: Health Check - Spring Boot Payment (volteryde-payment)
        run: |
          echo "🏥 Running health checks on volteryde-payment..."
          kubectl wait --for=condition=ready pod -l app=volteryde-payment -n production --timeout=5m
          kubectl get pods -n production -l app=volteryde-payment
          echo "✅ Spring Boot Payment health check passed"

      - name: Run Production Smoke Tests
        run: |
          echo "🧪 Running production smoke tests..."
          sleep 30
          kubectl get pods -n production
          echo "✅ Production smoke tests completed"
        continue-on-error: true

      - name: Monitor Production Metrics
        run: |
          echo "📊 Monitoring production metrics for 5 minutes..."

          # Monitor for 5 minutes
          for i in {1..10}; do
            echo "Monitoring iteration $i/10..."
            
            # Check pod status
            kubectl get pods -n production
            
            # Check for CrashLoopBackOff or errors
            ERROR_PODS=$(kubectl get pods -n production --field-selector=status.phase!=Running,status.phase!=Succeeded -o json | jq '.items | length')
            
            if [ "$ERROR_PODS" -gt 0 ]; then
              echo "⚠️ WARNING: $ERROR_PODS pods in error state"
              kubectl get pods -n production --field-selector=status.phase!=Running,status.phase!=Succeeded
            fi
            
            # Check CloudWatch alarms
            ALARMS=$(aws cloudwatch describe-alarms \
              --alarm-name-prefix volteryde-prod \
              --state-value ALARM \
              --query 'MetricAlarms[*].AlarmName' \
              --output text)
            
            if [ -n "$ALARMS" ]; then
              echo "🚨 CRITICAL: CloudWatch alarms triggered: $ALARMS"
              exit 1
            fi
            
            sleep 30
          done

          echo "✅ Metrics monitoring completed - no issues detected"

      - name: Tag successful deployment
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"

          # Tag in CloudWatch
          aws cloudwatch put-metric-data \
            --namespace Volteryde/Deployments \
            --metric-name ProductionDeployment \
            --value 1 \
            --dimensions Environment=production,ImageTag=${IMAGE_TAG} \
            --timestamp $(date -u +%Y-%m-%dT%H:%M:%S)

          # Tag Docker images as production
          aws ecr put-image-tag-mutability \
            --repository-name volteryde/nestjs-service \
            --image-tag-mutability IMMUTABLE || true

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Production deployment successful",
              "attachments": [
                {
                  "color": "#36a64f",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🎉 Production — Deployment Successful" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nProduction (`volteryde-prod`)" },
                        { "type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                        { "type": "mrkdwn", "text": "*API URL:*\nhttps://api.volteryde.com" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Services Deployed (Blue-Green):*\n• `nestjs-service` — API Gateway & Core Services\n• `springboot-service` — Auth & Payment\n• `temporal-workers` — Workflow Engine"
                      }
                    },
                    { "type": "divider" },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "✅ Health checks passed  |  ✅ Smoke tests passed  |  ✅ Metrics stable  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                      ]
                    }
                  ]
                }
              ]
            }

      - name: Emergency Rollback on Failure
        if: failure()
        run: |
          echo "🚨 CRITICAL: Production deployment failed - initiating emergency rollback..."

          kubectl rollout undo deployment/volteryde-api -n production || true
          kubectl rollout undo deployment/volteryde-auth -n production || true
          kubectl rollout undo deployment/volteryde-client-auth -n production || true
          kubectl rollout undo deployment/volteryde-payment -n production || true
          kubectl rollout undo deployment/temporal-workers -n production || true

          kubectl rollout status deployment/volteryde-api -n production --timeout=15m || true
          kubectl rollout status deployment/volteryde-auth -n production --timeout=15m || true
          kubectl rollout status deployment/volteryde-client-auth -n production --timeout=15m || true
          kubectl rollout status deployment/volteryde-payment -n production --timeout=15m || true
          kubectl rollout status deployment/temporal-workers -n production --timeout=15m || true

          kubectl get pods -n production
          echo "✅ Emergency rollback completed"

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "CRITICAL: Production deployment failed",
              "attachments": [
                {
                  "color": "#cc0000",
                  "blocks": [
                    {
                      "type": "header",
                      "text": { "type": "plain_text", "text": "🚨 Production — DEPLOYMENT FAILED" }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Environment:*\nProduction (`volteryde-prod`)" },
                        { "type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ needs.build-and-push.outputs.image-tag }}`" },
                        { "type": "mrkdwn", "text": "*Severity:*\n🔴 Critical" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Emergency Rollback:*\n⚠️ All services rolled back to previous version:\n• `nestjs-service`\n• `springboot-service`\n• `temporal-workers`\n\n*Immediate Action Required:*\n1. Check <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|deployment logs>\n2. Review CloudWatch alarms\n3. Verify rollback health\n4. *Do NOT retry* until root cause is found"
                      }
                    },
                    { "type": "divider" },
                    {
                      "type": "context",
                      "elements": [
                        { "type": "mrkdwn", "text": "🚨 Production incident  |  🔄 Emergency rollback executed  |  <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>" }
                      ]
                    }
                  ]
                }
              ]
            }

      - name: Create incident ticket on failure
        if: failure()
        run: |
          echo "📋 Creating incident ticket..."

          # This would integrate with your incident management system
          # Example: PagerDuty, Opsgenie, or Jira

          echo "Incident: Production deployment failed"
          echo "Image Tag: ${{ needs.build-and-push.outputs.image-tag }}"
          echo "Rollback: Executed"
          echo "Status: Requires investigation"

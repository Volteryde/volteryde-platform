apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: volteryde-ingress
  annotations:
    alb.ingress.kubernetes.io/group.name: volteryde-shared
    alb.ingress.kubernetes.io/group.order: "30"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:sa-east-1:776127042419:certificate/7b6a8739-4e38-436a-867f-3553fc735a17,arn:aws:acm:sa-east-1:776127042419:certificate/c8ce495c-187b-4e8b-9995-9625d97d068b"
spec:
  rules:
  # ---- api.volteryde.com ----
  - host: api.volteryde.com
    http:
      paths:
      - path: /api/v1/telematics
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/booking
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/fleet
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/charging
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/route
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: volteryde-auth
            port:
              number: 80
      - path: /api/v1/wallet
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/payment
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 80
      - path: /api/v1/health
        pathType: Exact
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
  # ---- api.volteryde.org (same routing, wildcard cert covers *.volteryde.org) ----
  - host: api.volteryde.org
    http:
      paths:
      - path: /api/v1/telematics
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/booking
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/fleet
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/charging
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/route
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/auth
        pathType: Prefix
        backend:
          service:
            name: volteryde-auth
            port:
              number: 80
      - path: /api/v1/wallet
        pathType: Prefix
        backend:
          service:
            name: volteryde-api
            port:
              number: 80
      - path: /api/v1/payment
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 80
      - path: /api/v1/health
        pathType: Exact
        backend:
          service:
            name: volteryde-api
            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-ui-ingress
  annotations:
    alb.ingress.kubernetes.io/group.name: volteryde-shared
    alb.ingress.kubernetes.io/group.order: "50"
spec:
  rules:
  - host: temporal.volteryde.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: temporal-ui-service
            port:
              number: 8080

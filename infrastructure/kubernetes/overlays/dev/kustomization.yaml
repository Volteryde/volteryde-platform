# ============================================================================
# Kustomize Development Environment Overlay
# ============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: volteryde-dev

resources:
  - ../../base

labels:
  - pairs:
      environment: development
      cost-center: development
    includeSelectors: false

patchesStrategicMerge:
  - configmap-patch.yaml
  - replicas-patch.yaml

patchesJson6902:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: volteryde-ingress
    path: ingress-patch.yaml

# Image overrides — CI/CD will dynamically set tags via: kustomize edit set image
images:
  - name: volteryde/nestjs-service
    newTag: latest
  - name: volteryde/springboot-service
    newTag: latest
  - name: volteryde/springboot-payment
    newTag: latest
  - name: volteryde/temporal-workers
    newTag: latest

replicas:
  - name: volteryde-api
    count: 1
  - name: volteryde-auth
    count: 1
  - name: volteryde-payment
    count: 1
  - name: temporal-workers
    count: 1

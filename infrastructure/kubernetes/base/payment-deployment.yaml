# ============================================================================
# Spring Boot Payment Service Deployment
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: volteryde-payment
  labels:
    app: volteryde-payment
    component: backend
    domain: payment
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: volteryde-payment
  template:
    metadata:
      labels:
        app: volteryde-payment
        component: backend
        tech: springboot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: volteryde-sa
      automountServiceAccountToken: false
      containers:
        - name: springboot-payment
          image: volteryde/springboot-payment:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: volteryde-payment-db
                  key: DATABASE_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: volteryde-payment-db
                  key: DATABASE_PASSWORD
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: volteryde-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: volteryde-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: volteryde-payment-db
                  key: DATABASE_NAME
            - name: PAYSTACK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: volteryde-secrets
                  key: PAYSTACK_SECRET_KEY
            - name: PAYSTACK_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: volteryde-secrets
                  key: PAYSTACK_PUBLIC_KEY
            - name: PAYSTACK_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: volteryde-secrets
                  key: PAYSTACK_WEBHOOK_SECRET
            - name: PAYSTACK_CALLBACK_URL
              valueFrom:
                configMapKeyRef:
                  name: volteryde-config
                  key: PAYSTACK_CALLBACK_URL
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          startupProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 20"]
      terminationGracePeriodSeconds: 40

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  labels:
    app: volteryde-payment
spec:
  selector:
    app: volteryde-payment
  ports:
    - port: 80
      targetPort: 8083
      protocol: TCP
      name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: volteryde-payment-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: volteryde-payment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
